<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The DOM</title>

    <style>
        :root {
            color: #333;
            background-color: antiquewhite;
        }

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            margin: 15px;
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: grid;
            place-items: center;
            max-height: 100vh;
        }

        .content {
            width: 50%;
        }

        .form {
            display: grid;
            place-items: center;
        }

        div h1 {
            text-align: center;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="content">
            <div>
                <h1>This is is the power of DOM</h1>
                <p id="content-data"></p>
            </div>
            <div class="form">
                <label for="input">Type Anything:</label>
                <input type="text" name="input" id="input">
                <button type="button" class="btn-change" id="change">Change Content</button>
            </div>

        </div>
    </div>
    
    <script>
        const paragraph  = document.getElementById('content-data');
        const input = document.getElementById('input');
        const btn = document.querySelector('.btn-change');

        btn.addEventListener('click', () => {
            paragraph.innerHTML = input.value;
        });
        
    </script>
</body>

</html>
