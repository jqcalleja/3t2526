<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Using JavaScript: Variables and Control Structures</title>
</head>
<body>
    <script>
        let n1 = 10;
        let n2 = 12;
        console.log(n1);
        let result = n1 + n2;
        console.log("The sum of " + n1 + " and " + n2 + " is " + result);

        if(result % 2 === 0){
            console.log(result + " is an even number.")
        } else {
            console.log(result + " is an odd number.")
        }

        for(let i = 1; i <= 5; i++) {
            console.log("Iteration: " + i);
        }
    </script>
</body>
</html>
